services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb_usuarios
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: bd_ventas
      MARIADB_USER: usuario
      MARIADB_PASSWORD: usuario123

    ports:
      - "3307:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend_usuarios
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./backend:/var/www/html

    depends_on:
      - mariadb

  frontend:
    build: ./frontend
    container_name: frontend_usuarios
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  mariadb_data: